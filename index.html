<!DOCTYPE html>
<!-- Generated by GitHub Copilot -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>

<h1>Tetris</h1>

<!-- ── SETUP SCREEN ── -->
<section id="setup-screen" aria-label="Game setup">
  <h2>Setup your match</h2>

  <div class="option-group">
    <label>Difficulty (Drop Speed)</label>
    <div class="btn-row" role="group" aria-label="Difficulty selection">
      <button class="opt-btn selected" data-group="diff" data-val="1" aria-pressed="true">1 — Easy</button>
      <button class="opt-btn" data-group="diff" data-val="2" aria-pressed="false">2</button>
      <button class="opt-btn" data-group="diff" data-val="3" aria-pressed="false">3</button>
      <button class="opt-btn" data-group="diff" data-val="4" aria-pressed="false">4</button>
      <button class="opt-btn" data-group="diff" data-val="5" aria-pressed="false">5 — Hard</button>
    </div>
  </div>

  <div class="option-group">
    <label>Game Mode</label>
    <div class="btn-row" role="group" aria-label="Game mode selection">
      <button class="opt-btn selected" data-group="mode" data-val="normal" aria-pressed="true">Normal ↓</button>
      <button class="opt-btn" data-group="mode" data-val="inverted" aria-pressed="false">Inverted ↑</button>
    </div>
  </div>

  <button id="start-btn">Start Match</button>
</section>

<!-- ── GAME SCREEN ── -->
<section id="game-screen" aria-label="Tetris game">
  <div id="game-area">

    <!-- Left panel: hold + difficulty info -->
    <div class="side-panel">
      <div class="panel-box">
        <h3>Hold</h3>
        <canvas id="hold-canvas" width="90" height="90" aria-label="Held piece"></canvas>
      </div>
      <div class="panel-box">
        <h3>Score</h3>
        <div id="score-val">0</div>
      </div>
      <div class="panel-box">
        <h3>Lines</h3>
        <div id="lines-val">0</div>
      </div>
      <div class="panel-box">
        <h3>Combo</h3>
        <div id="combo-val">x0</div>
      </div>
    </div>

    <!-- Board -->
    <canvas id="board" width="300" height="600" aria-label="Tetris board"></canvas>

    <!-- Right panel: next queue -->
    <div class="side-panel">
      <div class="panel-box">
        <h3>Next</h3>
        <canvas id="next-canvas" width="90" height="450" aria-label="Next pieces queue"></canvas>
      </div>
      <div class="panel-box">
        <h3>Mode</h3>
        <div id="mode-badge">Normal</div>
      </div>
    </div>

  </div>

  <div id="controls" role="note">
    <span>← →</span> Move &nbsp;|&nbsp; <span>↑ / Z</span> Rotate CW / CCW &nbsp;|&nbsp;
    <span>↓</span> Soft Drop &nbsp;|&nbsp; <span>Space</span> Hard Drop &nbsp;|&nbsp;
    <span>C</span> Hold &nbsp;|&nbsp; <span>P</span> Pause
  </div>
</section>

<!-- ── OVERLAY ── -->
<div id="overlay" role="dialog" aria-modal="true" aria-labelledby="overlay-title">
  <div id="overlay-box">
    <h2 id="overlay-title">GAME OVER</h2>
    <p>Final Score: <strong id="final-score">0</strong></p>
    <p>Lines Cleared: <strong id="final-lines">0</strong></p>
    <button id="restart-btn">Play Again</button>
  </div>
</div>

</body>
</html>
